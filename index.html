<!DOCTYPE html>
<html>
<head>
    <title>SaaS Box Library</title>
    <style>
        body { margin: 0; background: #1a1a1a; font-family: sans-serif; color: white; display: flex; overflow: hidden; }
        #sidebar { width: 320px; background: #222; padding: 25px; height: 100vh; border-right: 1px solid #444; z-index: 10; overflow-y: auto; }
        #viewer { flex: 1; height: 100vh; }
        .status { padding: 10px; border-radius: 4px; font-size: 11px; margin-bottom: 20px; text-align: center; font-weight: bold; }
        .online { background: #1b4332; color: #74c69d; }
        .offline { background: #432818; color: #ffb4a2; }
        label { display: block; font-size: 11px; color: #888; margin-top: 15px; }
        input, select { width: 100%; padding: 10px; background: #333; color: white; border: 1px solid #444; border-radius: 4px; margin-top: 5px; box-sizing: border-box; }
        .debug-panel { background: #000; padding: 15px; margin-top: 25px; border-radius: 5px; border-left: 4px solid #3498db; font-family: monospace; }
    </style>
</head>
<body>

<div id="sidebar">
    <div id="status" class="status offline">SYNCING...</div>
    
    <label>Model Template</label>
    <select id="modelSelector">
        <option value="156430">156430 - Flip Top Mailer</option>
        <option value="150010">150010 - Crash Lock</option>
    </select>

    <label>Dimensions (L, W, H)</label>
    <div style="display:flex; gap:5px;">
        <input type="number" id="L" value="120">
        <input type="number" id="W" value="60">
        <input type="number" id="H" value="160">
    </div>

    <label>Fold Simulation</label>
    <input type="range" id="Fold" min="0" max="140" value="90">

    <div class="debug-panel">
        <div>Lid (A): <span id="valA" style="color:#3498db">--</span></div>
        <div>Tuck (B): <span id="valB" style="color:#3498db">--</span></div>
    </div>
</div>

<div id="viewer"></div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSWnGV2wI7Lxo1m8ZKl5V4r1shXGpvYt9t-fxjQrdocHS5dJ3URgDjT5ytKMNmlIjrrEFFFIfPT1Voq/pub?gid=783217424&single=true&output=csv';
    
    let library = { 
        "156430": { lidA: "W+1", tuckB: "20" } 
    };

    // --- 3D SCENE ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 320) / window.innerHeight, 1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth - 320, window.innerHeight);
    document.getElementById('viewer').appendChild(renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    camera.position.set(250, 250, 400);
    camera.lookAt(0, 0, 0);

    const boxGroup = new THREE.Group();
    scene.add(boxGroup);

    // --- LOGIC ---
    async function syncData() {
        try {
            const res = await fetch(`${SHEET_URL}&cb=${Date.now()}`);
            const text = await res.text();
            const rows = text.split('\n').map(r => r.split(',').map(c => c.trim()));
            
            rows.forEach((row, i) => {
                if(i > 0 && row[0]) {
                    // Mapping columns: A=0, F=5, G=6
                    library[row[0]] = { lidA: row[5], tuckB: row[6] };
                }
            });
            document.getElementById('status').className = "status online";
            document.getElementById('status').innerText = "ONLINE: SYNCED";
        } catch (e) {
            document.getElementById('status').innerText = "OFFLINE: LOCAL CACHE";
        }
        update3D();
    }

    function solve(formula, L, W, H) {
        if(!formula) return 0;
        try {
            // This turns "W+1" into "60+1"
            let mathStr = formula.toString().replace(/W/g, W).replace(/L/g, L).replace(/H/g, H);
            return eval(mathStr);
        } catch(e) { return 0; }
    }

    function update3D() {
        boxGroup.clear(); // Important: Stops repetition!

        const id = document.getElementById('modelSelector').value;
        const L = parseFloat(document.getElementById('L').value) || 1;
        const W = parseFloat(document.getElementById('W').value) || 1;
        const H = parseFloat(document.getElementById('H').value) || 1;
        const fold = (document.getElementById('Fold').value * Math.PI) / 180;

        const data = library[id] || library["156430"];
        const A = solve(data.lidA, L, W, H);
        const B = solve(data.tuckB, L, W, H);

        document.getElementById('valA').innerText = A.toFixed(1) + 'mm';
        document.getElementById('valB').innerText = B.toFixed(1) + 'mm';

        const mat = new THREE.MeshPhongMaterial({ color: 0xd2b48c, side: THREE.DoubleSide });

        // DRAW BOX BODY
        const body = [
            { g: [L, H, 1], p: [0, 0, 0] },          // Front
            { g: [L, H, 1], p: [0, 0, -W] },         // Back
            { g: [1, H, W], p: [-L/2, 0, -W/2] },    // Side L
            { g: [1, H, W], p: [L/2, 0, -W/2] },     // Side R
            { g: [L, 1, W], p: [0, -H/2, -W/2] }     // Bottom
        ];

        body.forEach(p => {
            const m = new THREE.Mesh(new THREE.BoxGeometry(...p.g), mat);
            m.position.set(...p.p);
            boxGroup.add(m);
        });

        // HINGED LID (Attached to Back Panel)
        const lidPivot = new THREE.Group();
        lidPivot.position.set(0, H/2, -W);
        boxGroup.add(lidPivot);

        const lid = new THREE.Mesh(new THREE.BoxGeometry(L, A, 1), mat);
        lid.position.y = A/2;
        lidPivot.add(lid);
        lidPivot.rotation.x = fold;

        // TUCK FLAP (Attached to Lid)
        const tuckPivot = new THREE.Group();
        tuckPivot.position.y = A;
        lid.add(tuckPivot);

        const tuck = new THREE.Mesh(new THREE.BoxGeometry(L, B, 1), mat);
        tuck.position.y = B/2;
        tuckPivot.add(tuck);
        tuckPivot.rotation.x = Math.PI/2;

        renderer.render(scene, camera);
    }

    document.querySelectorAll('input, select').forEach(el => el.oninput = update3D);
    syncData();

    function animate() {
        requestAnimationFrame(animate);
        boxGroup.rotation.y += 0.005;
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
