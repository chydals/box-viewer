<!DOCTYPE html>
<html>
<head>
    <title>Pacdora-Style Folding Viewer</title>
    <style>
        body { margin: 0; background: #1a1a1a; font-family: 'Segoe UI', sans-serif; color: white; display: flex; }
        #sidebar { width: 320px; background: #252525; padding: 20px; height: 100vh; border-right: 1px solid #444; box-shadow: 2px 0 15px #000; z-index: 10; }
        #viewer { flex: 1; height: 100vh; }
        .status { padding: 8px; border-radius: 4px; font-size: 11px; margin-bottom: 15px; text-align: center; font-weight: bold; }
        .online { background: #1b4332; color: #74c69d; }
        .offline { background: #432818; color: #ffb4a2; }
        label { display: block; font-size: 11px; color: #888; margin-bottom: 5px; margin-top: 15px; }
        input, select { width: 100%; padding: 10px; background: #333; color: white; border: 1px solid #444; border-radius: 4px; }
        .debug { background: #000; padding: 10px; margin-top: 20px; font-family: monospace; font-size: 12px; color: #3498db; }
        button { width: 100%; padding: 10px; margin-top: 10px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div id="sidebar">
    <div id="status" class="status offline">OFFLINE: DEFAULT MATH</div>
    <button onclick="location.reload()">Force Refresh Sheet</button>

    <label>Model ID</label>
    <select id="modelSelector">
        <option value="156430">156430 - Flip Top Mailer</option>
        <option value="150010">150010 - Crash Lock</option>
    </select>

    <label>Dimensions (L, W, H)</label>
    <input type="number" id="L" value="120">
    <input type="number" id="W" value="60">
    <input type="number" id="H" value="160">

    <label>Fold Box (Open/Close)</label>
    <input type="range" id="Fold" min="0" max="160" value="90">

    <div class="debug" id="debug">Calculating...</div>
</div>

<div id="viewer"></div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSWnGV2wI7Lxo1m8ZKl5V4r1shXGpvYt9t-fxjQrdocHS5dJ3URgDjT5ytKMNmlIjrrEFFFIfPT1Voq/pub?gid=783217424&single=true&output=csv';
    
    // Default fallback logic if Google fails
    let library = {
        "156430": { lidA: "W+1", tuckB: "20" },
        "150010": { lidA: "W-0.5", tuckB: "W/3" }
    };

    // --- 3D SCENE SETUP ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 320) / window.innerHeight, 1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth - 320, window.innerHeight);
    document.getElementById('viewer').appendChild(renderer.domElement);
    
    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const sun = new THREE.DirectionalLight(0xffffff, 0.8);
    sun.position.set(100, 200, 100);
    scene.add(sun);

    camera.position.set(250, 250, 400);
    camera.lookAt(0, 0, 0);

    const boxGroup = new THREE.Group();
    scene.add(boxGroup);

    async function syncSheet() {
        try {
            // Using a CORS proxy to bypass security blocks
            const proxy = 'https://api.allorigins.win/get?url=' + encodeURIComponent(SHEET_URL);
            const res = await fetch(proxy);
            const json = await res.json();
            const rows = json.contents.split('\n').map(r => r.split(','));
            
            rows.forEach((row, i) => {
                if(i > 0 && row[0]) {
                    library[row[0].trim()] = { lidA: row[6], tuckB: row[7] };
                }
            });
            document.getElementById('status').className = "status online";
            document.getElementById('status').innerText = "ONLINE: SYNCED";
        } catch (e) {
            console.warn("Using default library.");
        }
        updateBox();
    }

    function createPanel(w, h, color=0xd2b48c) {
        const mesh = new THREE.Mesh(
            new THREE.BoxGeometry(w, h, 1),
            new THREE.MeshPhongMaterial({ color: color, side: THREE.DoubleSide })
        );
        const pivot = new THREE.Group();
        pivot.add(mesh);
        mesh.position.y = h / 2; // Set hinge to the bottom edge
        return pivot;
    }

    function updateBox() {
        boxGroup.clear();
        
        const id = document.getElementById('modelSelector').value;
        const L = parseFloat(document.getElementById('L').value);
        const W = parseFloat(document.getElementById('W').value);
        const H = parseFloat(document.getElementById('H').value);
        const foldVal = document.getElementById('Fold').value;
        const rad = (foldVal * Math.PI) / 180;

        const rules = library[id] || library["156430"];
        const solve = (f) => eval(f.replace(/W/g, W).replace(/L/g, L).replace(/H/g, H).replace(/=/g, ''));
        
        const A = solve(rules.lidA);
        const B = solve(rules.tuckB);

        document.getElementById('debug').innerHTML = `Lid (A): ${A}mm<br>Tuck (B): ${B}mm`;

        // 1. FRONT PANEL (Static)
        const front = createPanel(L, H);
        boxGroup.add(front);

        // 2. TOP LID (Hinged to Front)
        const lid = createPanel(L, A, 0xe2c49c);
        lid.position.y = H; // Move to top of front panel
        lid.rotation.x = -rad; // Rotate hinge
        front.add(lid);

        // 3. TUCK FLAP (Hinged to Lid)
        const tuck = createPanel(L, B, 0xc2a47c);
        tuck.position.y = A; // Move to end of lid
        tuck.rotation.x = -rad * 0.2; // Slight extra fold
        lid.add(tuck);

        renderer.render(scene, camera);
    }

    document.querySelectorAll('input, select').forEach(el => el.oninput = updateBox);
    syncSheet();

    function animate() {
        requestAnimationFrame(animate);
        boxGroup.rotation.y += 0.005;
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
