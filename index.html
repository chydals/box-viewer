<!DOCTYPE html>
<html>
<head>
    <title>SaaS Box Viewer - Clean Version</title>
    <style>
        body { margin: 0; background: #1a1a1a; font-family: 'Segoe UI', sans-serif; color: white; display: flex; overflow: hidden; }
        #sidebar { width: 320px; background: #252525; padding: 25px; height: 100vh; border-right: 1px solid #444; z-index: 10; overflow-y: auto; }
        #viewer { flex: 1; height: 100vh; position: relative; }
        .status { padding: 12px; border-radius: 6px; font-size: 11px; margin-bottom: 20px; text-align: center; font-weight: bold; }
        .online { background: #1b4332; color: #74c69d; border: 1px solid #2d6a4f; }
        .offline { background: #432818; color: #ffb4a2; border: 1px solid #6f1d1b; }
        label { display: block; font-size: 11px; color: #888; margin-top: 15px; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; background: #333; color: white; border: 1px solid #444; border-radius: 4px; box-sizing: border-box; }
        .debug-panel { background: #111; padding: 15px; margin-top: 25px; border-radius: 5px; border-left: 4px solid #3498db; }
        .calc-line { display: flex; justify-content: space-between; font-family: monospace; font-size: 13px; margin-bottom: 5px; }
        .val { color: #3498db; }
    </style>
</head>
<body>

<div id="sidebar">
    <div id="status" class="status offline">SYNCING...</div>
    
    <label>Box Model</label>
    <select id="modelSelector">
        <option value="156430">156430 - Flip Top Mailer</option>
        <option value="150010">150010 - Crash Lock</option>
    </select>

    <label>Inner Dimensions (mm)</label>
    <div style="display:flex; gap:8px;">
        <input type="number" id="L" value="120">
        <input type="number" id="W" value="60">
        <input type="number" id="H" value="160">
    </div>

    <label>Fold View</label>
    <input type="range" id="Fold" min="0" max="140" value="90">

    <div class="debug-panel">
        <label style="margin-top:0; color:#555">Live Logic</label>
        <div class="calc-line">Lid (A): <span id="valA" class="val">--</span></div>
        <div class="calc-line">Tuck (B): <span id="valB" class="val">--</span></div>
    </div>
</div>

<div id="viewer"></div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSWnGV2wI7Lxo1m8ZKl5V4r1shXGpvYt9t-fxjQrdocHS5dJ3URgDjT5ytKMNmlIjrrEFFFIfPT1Voq/pub?gid=783217424&single=true&output=csv';
    
    let library = { 
        "156430": { lidA: "W+1", tuckB: "20" },
        "150010": { lidA: "W-0.5", tuckB: "W/3" }
    };

    // --- 3D SETUP ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 320) / window.innerHeight, 1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth - 320, window.innerHeight);
    document.getElementById('viewer').appendChild(renderer.domElement);
    
    scene.add(new THREE.AmbientLight(0xffffff, 0.9));
    camera.position.set(250, 250, 400);
    camera.lookAt(0, 0, 0);

    const boxGroup = new THREE.Group();
    scene.add(boxGroup);

    // --- DATA LOADING ---
    async function syncData() {
        try {
            const response = await fetch(`${SHEET_URL}&cb=${Date.now()}`);
            const text = await response.text();
            const rows = text.split('\n').map(r => r.split(',').map(c => c.trim()));
            
            rows.forEach((row, i) => {
                if(i > 0 && row[0]) {
                    library[row[0]] = { lidA: row[5], tuckB: row[6] };
                }
            });
            document.getElementById('status').className = "status online";
            document.getElementById('status').innerText = "ONLINE: SYNCED";
        } catch (e) {
            document.getElementById('status').innerText = "OFFLINE: CACHE ONLY";
        }
        update3D();
    }

    // --- RENDERING LOGIC ---
    function update3D() {
        // CRITICAL: Clear the scene before redrawing to prevent repeating panels
        boxGroup.clear();

        const id = document.getElementById('modelSelector').value;
        const L = parseFloat(document.getElementById('L').value) || 1;
        const W = parseFloat(document.getElementById('W').value) || 1;
        const H = parseFloat(document.getElementById('H').value) || 1;
        const fold = (document.getElementById('Fold').value * Math.PI) / 180;

        const rules = library[id] || library["156430"];
        const solve = (f) => {
            try { return eval(f.replace(/W/g, W).replace(/L/g, L).replace(/H/g, H).replace(/=/g, '')); }
            catch { return 0; }
        };

        const A = solve(rules.lidA);
        const B = solve(rules.tuckB);

        document.getElementById('valA').innerText = A.toFixed(1) + 'mm';
        document.getElementById('valB').innerText = B.toFixed(1) + 'mm';

        const mat = new THREE.MeshPhongMaterial({ color: 0xd2b48c, side: THREE.DoubleSide });

        // 1. Static Body
        const body = [
            { g: [L, H, 1], p: [0, 0, 0] },          // Front
            { g: [L, H, 1], p: [0, 0, -W] },         // Back
            { g: [1, H, W], p: [-L/2, 0, -W/2] },    // Left
            { g: [1, H, W], p: [L/2, 0, -W/2] },     // Right
            { g: [L, 1, W], p: [0, -H/2, -W/2] }     // Bottom
        ];

        body.forEach(item => {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(...item.g), mat);
            mesh.position.set(...item.p);
            boxGroup.add(mesh);
        });

        // 2. Hinged Lid (Attaches to Back Panel)
        const lidPivot = new THREE.Group();
        lidPivot.position.set(0, H/2, -W);
        boxGroup.add(lidPivot);

        const lid = new THREE.Mesh(new THREE.BoxGeometry(L, A, 1), mat);
        lid.position.y = A/2;
        lidPivot.add(lid);
        lidPivot.rotation.x = fold;

        // 3. Tuck Flap (Attaches to Lid)
        const tuckPivot = new THREE.Group();
        tuckPivot.position.y = A;
        lid.add(tuckPivot);

        const tuck = new THREE.Mesh(new THREE.BoxGeometry(L, B, 1), mat);
        tuck.position.y = B/2;
        tuckPivot.add(tuck);
        tuckPivot.rotation.x = Math.PI / 2;

        renderer.render(scene, camera);
    }

    // --- INITIALIZE ---
    document.querySelectorAll('input, select').forEach(el => el.oninput = update3D);
    syncData();

    function animate() {
        requestAnimationFrame(animate);
        boxGroup.rotation.y += 0.005;
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = (window.innerWidth - 320) / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth - 320, window.innerHeight);
    });
</script>
</body>
</html>
